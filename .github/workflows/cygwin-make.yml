name: Cygwin Make

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to build from'
        required: true
        default: 'https://codeberg.org/guile/guile.git'
        type: choice
        options:
          - 'https://codeberg.org/guile/guile.git'
          - 'https://github.com/spk121/guile.git'
      ref:
        description: 'Branch, tag, or commit SHA (leave blank for default branch)'
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Build and Install
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
    - name: Set git to Linux line endings
      run: git config --global core.autocrlf input

    - name: Clone source repository
      env:
        REPO_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.repository || 'https://codeberg.org/guile/guile.git' }}
        REPO_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
      run: |
        git clone "$env:REPO_URL" --depth=1
        if ($env:REPO_REF -ne '') {
          cd guile
          git fetch --depth=1 origin "$env:REPO_REF"
          git checkout "$env:REPO_REF"
        }
      shell: pwsh

    - name: Cache Cygwin packages
      uses: actions/cache@v5
      with:
        path: C:\cygwin-packages
        key: cygwin-${{ runner.os }}-${{ hashFiles('.github/workflows/**') }}

    - name: Install Cygwin
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: >-
          autoconf automake make libtool flex gperf
          gcc-core
          lzip xz
          gettext-devel libffi-devel libgc-devel
          libgmp-devel libreadline-devel libunistring-devel
          libiconv-devel
          texinfo texinfo-tex texlive

    - name: Prepare install prefix
      run: |
        mkdir -p "$(pwd)/app"
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Configure
      run: |
        set -o pipefail
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        cd guile
        ./autogen.sh 2>&1 | tee configure.log
        ./configure \
          CFLAGS="-g -O2 -Wall" \
          --prefix="$(pwd)/../app" \
          2>&1 | tee -a configure.log
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Upload Configure Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: configure-log
        path: |
          guile/configure.log
          guile/config.log
        if-no-files-found: ignore

    - name: Build
      run: |
        set -o pipefail
        cd guile
        make -j"$(nproc)" V=1 2>&1 | tee build.log
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Upload Build Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-log
        path: guile/build.log
        if-no-files-found: ignore

    - name: Install
      run: |
        set -o pipefail
        cd guile
        make install V=1 2>&1 | tee install.log
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Upload Install Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: install-log
        path: guile/install.log
        if-no-files-found: ignore

    - name: Verify Installation
      run: |
        export PATH="$(pwd)/app/bin:$PATH"
        ls -la "$(pwd)/app/bin/"
        ls -la "$(pwd)/app/lib/" || true
        echo "--- guile --version ---"
        guile --version
        echo "--- guile-config info ---"
        guile-config info || true
        echo "--- evaluate (display (+ 1 2)) ---"
        guile -c '(display (+ 1 2)) (newline)'
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'
