name: FreeBSD VM

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: 0

    # Build and test run in a single VM step to avoid the overhead of
    # launching multiple VM instances and to keep logs accessible for
    # the archive step.
    - name: Build and Test in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        prepare: |
          pkg install -y \
            texlive-base \
            texinfo \
            autoconf \
            automake \
            m4 \
            llvm \
            libtool \
            gettext \
            gperf \
            pkgconf \
            lzip \
            boehm-gc-threaded \
            gettext-runtime \
            gettext-tools \
            gmake \
            gmp \
            indexinfo \
            libffi \
            libiconv \
            libltdl \
            libtextstyle \
            libunistring
        run: |
          set -eux
          export LANG=C.UTF-8 LD_LIBRARY_PATH=/usr/local/lib PKG_CONFIG_PATH=/usr/local/lib/pkgconfig PATH="/usr/local/bin:$PATH"
          mkdir -p "$(pwd)/app"
          sed -i '' 's/^/;;/' test-suite/tests/version.test
          sed -i '' 's|\${M4:-m4} --version|command -v "${M4:-m4}"|' autogen.sh
          ./autogen.sh
          ./configure MAKE=gmake CFLAGS="-g -O2 -Wall" CPPFLAGS="-I/usr/local/include" LDFLAGS="-L/usr/local/lib" --prefix="$(pwd)/app" --enable-mini-gmp --with-libunistring-prefix=/usr/local --with-bdw-gc=bdw-gc-threaded
          gmake -j"$(sysctl -n hw.ncpu)" V=1 2>&1 | tee build.log
          gmake check V=1

    - name: Archive Test Logs
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: freebsd
        path: |
          ./*.log
          ./**/*.log
        if-no-files-found: warn
