name: MinGW Build

on:
  schedule:
    - cron: '00 12 * * *'  # Daily at 12:00 UTC
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to build from'
        required: true
        default: 'https://codeberg.org/guile/guile.git'
        type: choice
        options:
          - 'https://codeberg.org/guile/guile.git'
          - 'https://github.com/spk121/guile.git'
      ref:
        description: 'Branch, tag, or commit SHA (leave blank for default branch)'
        required: false
        default: ''
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { sys: MINGW64, env: x86_64,       thread: --without-threads, jit: --enable-jit=no,  jit_tag: jit-no,  gmp: --enable-mini-gmp, s64: --without-64-calls }
          - { sys: MINGW32, env: i686,         thread: --without-threads, jit: --enable-jit=yes, jit_tag: jit-yes, gmp: --enable-mini-gmp, s64: --without-64-calls }
          - { sys: UCRT64,  env: ucrt-x86_64,  thread: --without-threads, jit: --enable-jit=no,  jit_tag: jit-no,  gmp: --enable-mini-gmp, s64: --without-64-calls }
          - { sys: UCRT64,  env: ucrt-x86_64,  thread: --without-threads, jit: --enable-jit=yes, jit_tag: jit-yes, gmp: --enable-mini-gmp, s64: --without-64-calls }
          - { sys: CLANG64, env: clang-x86_64, thread: --without-threads, jit: --enable-jit=no,  jit_tag: jit-no,  gmp: --enable-mini-gmp, s64: --without-64-calls }

    runs-on: windows-latest
    name: Build ${{matrix.sys}} ${{matrix.env}} ${{matrix.thread}} ${{matrix.jit}} ${{matrix.gmp}} ${{matrix.s64}}
    timeout-minutes: 150
    permissions:
      contents: read

    steps:
    - name: Set git to Linux line endings
      run: git config --global core.autocrlf input

    - name: Clone source repository
      env:
        REPO_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.repository || 'https://codeberg.org/guile/guile.git' }}
        REPO_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
      run: |
        git clone "$env:REPO_URL" --depth=1
        if ($env:REPO_REF -ne '') {
          cd guile
          git fetch --depth=1 origin "$env:REPO_REF"
          git checkout "$env:REPO_REF"
        }
      shell: pwsh

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{matrix.sys}}
        cache: true
        install: >-
          autotools
          base-devel
          mingw-w64-${{matrix.env}}-toolchain
          flex
          gperf
          lzip xz
          pkgconf
          mingw-w64-${{matrix.env}}-gettext
          mingw-w64-${{matrix.env}}-gmp
          mingw-w64-${{matrix.env}}-libffi
          mingw-w64-${{matrix.env}}-gc
          mingw-w64-${{matrix.env}}-libiconv
          mingw-w64-${{matrix.env}}-readline
          mingw-w64-${{matrix.env}}-libunistring
          texinfo

    - name: Configure
      run: |
        set -o pipefail
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        mkdir "$(pwd)/app"
        cd guile
        ./autogen.sh 2>&1 | tee configure.log
        ./configure CFLAGS="-g -O2 -Wall" ${{matrix.thread}} ${{matrix.jit}} ${{matrix.gmp}} ${{matrix.s64}} --prefix="$(pwd)/../app" 2>&1 | tee -a configure.log
      shell: msys2 -o igncr '{0}'

    - name: Upload Configure Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: configure-log-${{matrix.sys}}-${{matrix.env}}-${{matrix.jit_tag}}
        path: |
          guile/configure.log
          guile/config.log
        if-no-files-found: ignore

    - name: Build
      run: |
        set -o pipefail
        cd guile
        make -j"$(nproc)" V=1 2>&1 | tee build.log
      shell: msys2 -o igncr '{0}'

    - name: Upload Build Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-log-${{matrix.sys}}-${{matrix.env}}-${{matrix.jit_tag}}
        path: guile/build.log
        if-no-files-found: ignore

    - name: Install
      run: |
        set -o pipefail
        cd guile
        make install V=1 2>&1 | tee install.log
      shell: msys2 -o igncr '{0}'

    - name: Upload Install Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: install-log-${{matrix.sys}}-${{matrix.env}}-${{matrix.jit_tag}}
        path: guile/install.log
        if-no-files-found: ignore

    - name: Verify Installation
      run: |
        export PATH="$(pwd)/app/bin:$PATH"
        ls -la "$(pwd)/app/bin/"
        echo "--- guile --version ---"
        guile --version
        echo "--- guile-config info ---"
        guile-config info || true
        echo "--- evaluate (display (+ 1 2)) ---"
        guile -c '(display (+ 1 2)) (newline)'
      shell: msys2 -o igncr '{0}'
