name: Ubuntu

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 07:00 UTC
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to build from'
        required: true
        default: 'https://codeberg.org/guile/guile.git'
        type: choice
        options:
          - 'https://codeberg.org/guile/guile.git'
          - 'https://github.com/spk121/guile.git'
      ref:
        description: 'Branch, tag, or commit SHA (leave blank for default branch)'
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - name: Checkout
      env:
        REPO_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.repository || 'https://codeberg.org/guile/guile.git' }}
        REPO_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
      run: |
        git clone "$env:REPO_URL" --depth=1
        if [ -n "$env:REPO_REF" ]; then
          git fetch --depth=1 origin "$env:REPO_REF"
          git checkout "$env:REPO_REF"
        fi
      shell: bash

    - name: Cache apt packages
      uses: actions/cache@v5
      with:
        path: /var/cache/apt/archives
        key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/**') }}

    - name: Install packages
      run: >-
        sudo apt-get update &&
        sudo apt-get install -y
        texlive
        texlive-plain-generic
        texinfo
        autoconf
        libtool
        gettext
        autopoint
        gperf
        pkg-config
        lzip
        libgc-dev
        libgmp-dev
        libltdl-dev
        libncurses5-dev
        libreadline-dev
        libunistring-dev

    - name: Configure
      run: |
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true DEBIAN_FRONTEND=noninteractive TZ=America/Los_Angeles
        mkdir "$(pwd)/app"
        sed -i 's/^/;;/' test-suite/tests/version.test
        ./autogen.sh
        ./configure CFLAGS="-g -O2 -Wall" --prefix="$(pwd)/app" | tee -a configure.log

    - name: Upload Configure Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: configure-log
        path: |
          configure.log
          config.log

    - name: Build
      run: make -j"$(nproc)" V=1 2>&1 | tee build.log

    - name: Upload Build Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-log
        path: build.log      

    - name: Run Unit Tests
      run: |
        git config --global --add safe.directory "$(pwd)"
        make check V=1 2>&1 | tee check.log
      shell: bash

    - name: Upload Check Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: check-log
        path: |
          check.log
          ./test-suite/tests/*.log
          ./test-suite/standalone/*.log
