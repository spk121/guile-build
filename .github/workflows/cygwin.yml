name: Cygwin

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
    - name: Set git to Linux line endings
      run: git config --global core.autocrlf input

    - name: Clone Guile from Codeberg
      run: git clone https://codeberg.org/guile/guile.git .

    - name: Cache Cygwin packages
      uses: actions/cache@v5
      with:
        path: C:\cygwin-packages
        key: cygwin-${{ runner.os }}-${{ hashFiles('.github/workflows/**') }}

    - name: Install Cygwin
      uses: cygwin/cygwin-install-action@v4
      with:
        packages: >-
          autoconf automake make libtool flex gperf
          gcc-core
          lzip xz
          gettext-devel libffi-devel libgc-devel
          libgmp-devel libreadline-devel libunistring-devel
          libiconv-devel
          texinfo texinfo-tex texlive

    - name: Configure
      run: |
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        mkdir "$(pwd)/app"
        sed -i 's/^/;;/' test-suite/tests/version.test
        ./autogen.sh 2>&1 | tee configure.log
        ./configure CFLAGS="-g -O2 -Wall" --prefix="$(pwd)/app" 2>&1 | tee -a configure.log
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Upload Configure Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: configure-log
        path: configure.log

    - name: Build
      run: make -j"$(nproc)" V=1 2>&1 | tee build.log
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Upload Build Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-log
        path: build.log

    - name: Run Unit Tests
      run: |
        git config --global --add safe.directory "$(pwd)"
        make check V=1 2>&1 | tee check.log
      shell: C:\cygwin\bin\bash.exe -o igncr '{0}'

    - name: Upload Check Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: check-log
        path: |
          check.log
          ./**/test-suite.log
  
