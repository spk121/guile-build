name: Debian GNU/Hurd VM

on:
  schedule:
    - cron: '0 16 * * *'  # Daily at 16:00 UTC
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to build from'
        required: true
        default: 'https://codeberg.org/guile/guile.git'
        type: choice
        options:
          - 'https://codeberg.org/guile/guile.git'
          - 'https://github.com/spk121/guile.git'
      ref:
        description: 'Branch, tag, or commit SHA (leave blank for default branch)'
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
    - name: Clone source repository
      env:
        REPO_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.repository || 'https://codeberg.org/guile/guile.git' }}
        REPO_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
      run: |
        git clone "$REPO_URL" --depth=1
        if [ -n "$REPO_REF" ]; then
          cd guile
          git fetch --depth=1 origin "$REPO_REF"
          git checkout "$REPO_REF"
        fi
      shell: bash

    # Build and test run in a single VM step. The Hurd VM only has SCP
    # available for copying files out, so each phase's log is explicitly
    # copied back after the phase runs (success or failure). The final
    # exit propagates any failure so the workflow status reflects it.
    - name: Build and Test in Debian GNU/Hurd VM
      uses: spk121/hurd-vm@v1
      with:
        sync: scp
        cpu: 4
        prepare: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            texlive-base \
            texinfo \
            autoconf \
            automake \
            m4 \
            llvm \
            libtool \
            gettext \
            gperf \
            pkg-config \
            lzip \
            libgc-dev \
            libgmp-dev \
            libffi-dev \
            libltdl-dev \
            libunistring-dev \
            flex \
            gperf \
            libreadline-dev \
            ca-certificates \
            curl \
            autopoint
        run: |
          set -u
          export LANG=C.UTF-8
          mkdir -p "$(pwd)/app"
          cd guile
          sed -i 's/^/;;/' test-suite/tests/version.test

          set -o pipefail

          # Configure phase
          ./autogen.sh 2>&1 | tee configure.log
          autogen_exit=$?
          ./configure CFLAGS="-g -O2 -Wall" --prefix="$(pwd)/../app" --enable-mini-gmp 2>&1 | tee -a configure.log
          configure_exit=$?

          # Copy configure logs back regardless of outcome
          scp configure.log . 2>/dev/null || true
          scp config.log . 2>/dev/null || true

          # Build phase (only if configure succeeded)
          build_exit=0
          if [ $autogen_exit -eq 0 ] && [ $configure_exit -eq 0 ]; then
            make -j"$(nproc)" V=1 2>&1 | tee build.log
            build_exit=$?
          fi
          scp build.log . 2>/dev/null || true

          # Check phase (only if build succeeded)
          check_exit=0
          if [ $build_exit -eq 0 ] && [ $autogen_exit -eq 0 ] && [ $configure_exit -eq 0 ]; then
            make check V=1 2>&1 | tee check.log
            check_exit=$?
          fi
          scp check.log . 2>/dev/null || true
          find test-suite -name "*.log" -type f -exec scp {} . \; 2>/dev/null || true

          # Propagate any failure
          if [ $autogen_exit -ne 0 ] || [ $configure_exit -ne 0 ] || [ $build_exit -ne 0 ] || [ $check_exit -ne 0 ]; then
            exit 1
          fi

    - name: Upload Configure Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: configure-log
        path: |
          configure.log
          config.log
          guile/configure.log
          guile/config.log
        if-no-files-found: ignore

    - name: Upload Build Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-log
        path: |
          build.log
          guile/build.log
        if-no-files-found: ignore

    - name: Upload Check Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: check-log
        path: |
          check.log
          *.log
          guile/check.log
          guile/test-suite/tests/*.log
          guile/test-suite/standalone/*.log
        if-no-files-found: ignore
