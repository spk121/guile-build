name: Debian GNU/Hurd VM

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: 0

    # Build and test run in a single VM step. The Hurd VM only has SCP
    # available for copying files out, so logs are explicitly copied
    # after each phase.
    - name: Build and Test in Debian GNU/Hurd VM
      uses: spk121/hurd-vm@v1
      with:
        sync: scp
        cpu: 4
        prepare: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            texlive-base \
            texinfo \
            autoconf \
            automake \
            m4 \
            llvm \
            libtool \
            gettext \
            gperf \
            pkg-config \
            lzip \
            libgc-dev \
            libgmp-dev \
            libffi-dev \
            libltdl-dev \
            libunistring-dev \
            flex \
            gperf \
            libreadline-dev \
            ca-certificates \
            curl \
            autopoint
        run: |
          set -eux
          export LANG=C.UTF-8
          mkdir -p "$(pwd)/app"
          sed -i 's/^/;;/' test-suite/tests/version.test
          sed -i 's|\${M4:-m4} --version|command -v "${M4:-m4}"|' autogen.sh
          ./autogen.sh
          ./configure CFLAGS="-g -O2 -Wall" --prefix="$(pwd)/app" --enable-mini-gmp

          set +e
          make -j"$(nproc)" V=1 2>&1 | tee build.log
          make_exit=$?
          scp build.log . || true
          make check V=1
          check_exit=$?
          find . -name "*.log" -type f -exec scp {} . \; || true
          set -e

          if [ $make_exit -ne 0 ] || [ $check_exit -ne 0 ]; then
            exit 1
          fi

    - name: Archive Test Logs
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: hurd
        path: |
          ./*.log
          ./**/*.log
        if-no-files-found: warn
