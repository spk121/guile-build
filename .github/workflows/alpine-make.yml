name: Alpine Make

on:
  schedule:
    - cron: '0 16 * * *'  # Daily at 16:00 UTC
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to build from'
        required: true
        default: 'https://codeberg.org/guile/guile.git'
        type: choice
        options:
          - 'https://codeberg.org/guile/guile.git'
          - 'https://github.com/spk121/guile.git'
      ref:
        description: 'Branch, tag, or commit SHA (leave blank for default branch)'
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Build and Install
    runs-on: ubuntu-latest
    container: alpine:latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - name: Install packages
      run: >-
        apk add --no-cache
        bash
        git
        build-base
        autoconf
        automake
        libtool
        gettext-dev
        gperf
        pkgconf
        lzip
        xz
        flex
        bison
        m4
        gc-dev
        gmp-dev
        libffi-dev
        libunistring-dev
        readline-dev
        ncurses-dev
        texinfo
        coreutils
        sed

    - name: Clone source repository
      env:
        REPO_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.repository || 'https://codeberg.org/guile/guile.git' }}
        REPO_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || '' }}
      run: |
        git clone "$REPO_URL" --depth=1
        if [ -n "$REPO_REF" ]; then
          cd guile
          git fetch --depth=1 origin "$REPO_REF"
          git checkout "$REPO_REF"
        fi
      shell: bash

    - name: Prepare install prefix
      run: |
        mkdir -p /app
      shell: bash

    - name: Configure
      run: |
        set -o pipefail
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        cd guile
        ./autogen.sh 2>&1 | tee configure.log
        ./configure \
          CFLAGS="-g -O2 -Wall" \
          LDFLAGS="-Wl,-rpath,/app/lib" \
          --prefix=/app \
          2>&1 | tee -a configure.log
      shell: bash

    - name: Upload Configure Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: configure-log
        path: |
          guile/configure.log
          guile/config.log
        if-no-files-found: ignore

    - name: Build
      run: |
        set -o pipefail
        cd guile
        make -j"$(nproc)" V=1 2>&1 | tee build.log
      shell: bash

    - name: Upload Build Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-log
        path: guile/build.log
        if-no-files-found: ignore

    - name: Install
      run: |
        set -o pipefail
        cd guile
        make install V=1 2>&1 | tee install.log
      shell: bash

    - name: Upload Install Log
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: install-log
        path: guile/install.log
        if-no-files-found: ignore

    - name: Verify Installation
      env:
        PATH: /app/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        LD_LIBRARY_PATH: /app/lib
      run: |
        ls -la /app/bin/
        ls -la /app/lib/
        echo "--- guile --version ---"
        guile --version
        echo "--- guile-config info ---"
        guile-config info || true
        echo "--- evaluate (display (+ 1 2)) ---"
        guile -c '(display (+ 1 2)) (newline)'
      shell: bash
