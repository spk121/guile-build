name: MacOS

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: 0

    - name: Cache Homebrew downloads
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/Homebrew
        key: homebrew-${{ runner.os }}-${{ hashFiles('.github/workflows/**') }}

    - name: Install packages
      run: |
        brew install bdw-gc gmp libunistring readline
        brew install gnu-sed pkg-config automake autoconf libtool
        brew install texinfo libiconv

    - name: Configure
      run: |
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        HOMEBREW_PREFIX="$(brew --prefix)"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/opt/gmp/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/readline/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/bdw-gc/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/libunistring/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/libiconv/lib/pkgconfig:${PKG_CONFIG_PATH}"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib -L${HOMEBREW_PREFIX}/opt/libiconv/lib"
        export CPPFLAGS="-I${HOMEBREW_PREFIX}/include -I${HOMEBREW_PREFIX}/opt/libiconv/include"
        mkdir -p "$(pwd)/app"
        sed -i '' 's/^/;;/' test-suite/tests/version.test
        ./autogen.sh
        ./configure CFLAGS="-g -O2 -Wall -std=c2x" --prefix="$(pwd)/app"

    - name: Build
      run: make -j"$(sysctl -n hw.ncpu)" V=1 2>&1 | tee build.log

    - name: Run Unit Tests
      run: make check V=1

    - name: Archive Test Logs
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: macos
        path: |
          ./*.log
          ./**/*.log
          if-no-files-found: warn
