name: MacOS

on:
  # Allow this workflow to be called from another workflow
  workflow_call:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: 0
    - name: Install packages
      run: >-
        brew install bdw-gc gmp libtool libunistring pkg-config readline gnu-sed automake autoconf
    - name: Configure
      run: |
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        mkdir `pwd`/app
        ./autogen.sh
        ./configure CFLAGS="-g -O2 -Wall -std=c2x" --prefix=`pwd`/app
    - name: Build
      run: |
        make -j4 V=1
    - name: Run Unit Tests
      run: make check V=1
    - name: Archive Test Logs
      if: success() || failure()
      uses: actions/upload-artifact@v6
      with:
        name: Test Logs
        path: ./*.log
