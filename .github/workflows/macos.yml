name: MacOS

on:
  # Allow this workflow to be called from another workflow
  workflow_call:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to checkout'
        default: 'spk121/guile'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout'
        default: ''
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        fetch-depth: 0
    - name: Install packages
      run: >-
        brew install bdw-gc gmp libtool libunistring pkg-config readline gnu-sed automake autoconf
    - name: Configure
      run: |
        export LANG=C.UTF-8 TERM=dumb VERBOSE=true TZ=America/Los_Angeles
        HOMEBREW_PREFIX=$(brew --prefix)
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/opt/gmp/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/readline/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/bdw-gc/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/libunistring/lib/pkgconfig:${PKG_CONFIG_PATH}"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export CPPFLAGS="-I${HOMEBREW_PREFIX}/include"
        mkdir `pwd`/app
        echo "3.0.99" > .tarball_version
        sed -i '' s/^GUILE_MICRO_VERSION=.*/GUILE_MICRO_VERSION=99/ GUILE-VERSION
        sed -i '' 's|m4_esyscmd(\[build-aux/git-version-gen[^]]*\])|[3.0.99]|g' configure.ac
        ./autogen.sh
        ./configure CFLAGS="-g -O2 -Wall -std=c2x" --prefix=`pwd`/app
    - name: Build
      run: make -j$(sysctl -n hw.ncpu) V=1
    - name: Run Unit Tests
      run: make check V=1
    - name: Archive Test Logs
      if: success() || failure()
      uses: actions/upload-artifact@v6
     with:
        name: Test Logs
        path: ./*.log
